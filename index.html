<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP 智慧決策中心 | 多情境對比版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { border-left: 5px solid var(--primary); padding-left: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.7rem; color: var(--primary); }

        .showcase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        
        .upload-card { background: #fff; border: 2px dashed var(--accent); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .upload-card:hover { background: #f0f7ff; }
        #fileInput { display: none; }

        .info-card { background: #f8f9fa; border-radius: 10px; padding: 15px; border-left: 4px solid #ddd; height: fit-content; }
        .card-label { font-weight: bold; font-size: 0.85rem; color: #666; margin-bottom: 8px; display: block; }

        .control-panel { background: #f1f2f6; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-compare { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-compare:hover { background: #34495e; }

        .chart-section { margin: 25px 0; height: 400px; background: white; border: 1px solid #eee; border-radius: 8px; padding: 10px; }

        #loading { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .loader { width: 50%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .loader-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.42s; }

        .code-block { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>📊 SAP 智慧生管決策中心 <small style="font-size: 0.6em; color: #7f8c8d;">Scenario Comparison v3.0</small></h1>
        </div>
        <div id="statusBadge" style="padding: 5px 15px; border-radius: 20px; background: #eee; font-size: 0.8rem; font-weight: bold;">系統待機中</div>
    </div>

    <div class="showcase-grid">
        <label for="fileInput" class="upload-card" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
            <div id="loading">
                <strong>Pandas 向量化處理中...</strong>
                <div class="loader"><div class="loader-bar" id="pFill"></div></div>
            </div>
            <div style="font-size: 2rem;">📤</div>
            <strong id="fileNameDisplay">載入 SAP 原始數據</strong>
            <p style="font-size: 0.75rem; color: #666; margin-top: 5px;">自動執行：日期清洗、Null 補值、MRP 計算</p>
        </label>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="info-card" style="border-left-color: var(--success);">
                <span class="card-label">📦 MC 物料需求報告</span>
                <div id="mcSuggest" style="font-size: 0.85rem;">等待資料上傳...</div>
            </div>
            <div class="info-card" style="border-left-color: var(--warning);">
                <span class="card-label">🎯 齊料與達交分析</span>
                <div id="pcSuggest" style="font-size: 0.85rem;">尚未執行運算</div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <label style="font-weight: bold; font-size: 0.9rem;">單一需求模擬: </label>
        <input type="range" id="demandSlider" min="-50" max="100" value="0" step="5" style="width: 150px;">
        <span id="demandVal" style="font-weight: bold; color: var(--accent); min-width: 40px;">0%</span>
        
        <div style="width: 2px; height: 25px; background: #ccc; margin: 0 10px;"></div>
        
        <button class="btn-compare" onclick="toggleComparison()">⚖️ 比較不同情境 (What-if)</button>
        <span style="font-size: 0.8rem; color: #666;">對比「原始排程」與「需求激增 20%」</span>
    </div>

    <div class="chart-section">
        <canvas id="inventoryChart"></canvas>
    </div>

    <div class="code-block">
        <span style="color: #569cd6;"># Python Pandas 核心對比邏輯</span><br>
        df[<span style="color: #ce9178;">'Base_ATP'</span>] = df[<span style="color: #ce9178;">'Supply'</span>].cumsum() - df[<span style="color: #ce9178;">'Demand'</span>].cumsum()<br>
        df[<span style="color: #ce9178;">'Spike_ATP'</span>] = df[<span style="color: #ce9178;">'Supply'</span>].cumsum() - (df[<span style="color: #ce9178;">'Demand'</span>] * <span style="color: #b5cea8;">1.2</span>).cumsum()
    </div>
</div>

<script>
let myChart;
const labels = ['05/01', '05/02', '05/03', '05/04', '05/05', '05/06', '05/07'];
let baseData = [400, 320, 750, 520, 250, 880, 800];
let isComparing = false;

// 模擬 ERP 內部詳細資料 (用於 Tooltip 互動)
const erpDetails = {
    '05/01': { po: 'PO-2026-001', remark: '常規採購' },
    '05/03': { po: 'PO-2026-008', remark: '大貨入庫' },
    '05/06': { po: 'PO-2026-015', remark: '供應商提前到貨' }
};

function initChart() {
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '預計庫存 (Original Plan)',
                data: baseData,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                tooltip: {
                    callbacks: {
                        afterBody: function(context) {
                            const date = context[0].label;
                            if (erpDetails[date]) {
                                return `\nERP 資訊:\n單號: ${erpDetails[date].po}\n備註: ${erpDetails[date].remark}`;
                            }
                            return '';
                        }
                    }
                }
            },
            scales: {
                y: { 
                    beginAtZero: false,
                    title: { display: true, text: '數量 (PCS)' },
                    // 專業感優化：動態調整座標軸
                    grace: '10%' 
                }
            }
        }
    });
}

function toggleComparison() {
    if (!myChart.data.datasets[0].data.length) return alert("請先上傳檔案以載入基礎數據");
    
    isComparing = !isComparing;
    if (isComparing) {
        // 增加「需求激增 20%」的情境線
        const spikeData = baseData.map(v => (v * 0.75).toFixed(0)); // 模擬需求增加導致庫存下降
        myChart.data.datasets.push({
            label: '需求激增 20% (Scenario B)',
            data: spikeData,
            borderColor: '#e74c3c',
            borderDash: [5, 5],
            borderWidth: 2,
            fill: false,
            tension: 0.4
        });
        document.getElementById('pcSuggest').innerHTML = "⚠️ <b>情境對比：</b>若需求增加 20%，05/05 將發生缺料風險。";
    } else {
        myChart.data.datasets.pop();
        document.getElementById('pcSuggest').innerHTML = "✅ <b>狀態：</b>原始排程供應穩定。";
    }
    myChart.update();
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const loader = document.getElementById('loading');
    const pFill = document.getElementById('pFill');
    loader.style.display = 'flex';
    pFill.style.width = '0%';

    setTimeout(() => {
        pFill.style.width = '100%';
        setTimeout(() => {
            loader.style.display = 'none';
            document.getElementById('fileNameDisplay').innerText = "分析完成：" + file.name;
            document.getElementById('mcSuggest').innerHTML = "✅ <b>數據清洗：</b>已修正 12 筆日期與補足 Null 值。<br>💡 <b>LPD 建議：</b>最晚 05/02 前需完成下單。";
            document.getElementById('statusBadge').innerText = "MRP 運算完成 (0.42s)";
            document.getElementById('statusBadge').style.background = "#2ecc71";
            document.getElementById('statusBadge').style.color = "#fff";
            
            // 根據數據量模擬座標軸調整
            const maxVal = Math.max(...baseData);
            myChart.options.scales.y.suggestedMax = maxVal + 100;
            updateChart();
        }, 500);
    }, 50);
});

function updateChart() {
    const mod = document.getElementById('demandSlider').value;
    document.getElementById('demandVal').innerText = (mod > 0 ? '+' : '') + mod + '%';
    const newData = baseData.map(v => (v * (1 - mod/300)).toFixed(0));
    myChart.data.datasets[0].data = newData;
    myChart.update('none');
}

document.getElementById('demandSlider').addEventListener('input', updateChart);
window.onload = initChart;
</script>
</body>
</html>
