<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP 智慧決策中心 | 數據透明版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; --bg-gray: #f8f9fa; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { border-left: 5px solid var(--primary); padding-left: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.7rem; color: var(--primary); }

        .showcase-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 25px; align-items: stretch; }
        
        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .input-card { border-top: 4px solid var(--accent); }
        .summary-card { background: var(--bg-gray); border-top: 4px solid var(--primary); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; background: var(--primary); color: white; margin-top: auto; }
        .btn-action:hover { opacity: 0.9; }

        /* 數據對比表樣式 */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .data-table th, .data-table td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
        .data-table th { color: #666; font-weight: normal; }
        .val-bold { font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        .chart-section { height: 380px; background: white; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 SAP 智慧生管決策中心 <small style="font-weight: normal; font-size: 0.6em; color: #7f8c8d;">Data Transparency Edition</small></h1>
        <div id="statusBadge" style="padding: 5px 12px; border-radius: 15px; background: #eee; font-size: 0.75rem; font-weight: bold;">系統就緒</div>
    </div>

    <div class="showcase-grid">
        <div class="card input-card">
            <div class="form-group">
                <label>步驟 1：預設原始平均庫存 (PCS)</label>
                <input type="number" id="baseInventory" class="form-control" value="600">
            </div>
            <div class="form-group">
                <label>步驟 2：輸入插單追加數量 (PCS)</label>
                <input type="number" id="surgeAmount" class="form-control" value="250" step="50">
            </div>
            <div class="form-group">
                <label>插單原因</label>
                <input type="text" id="surgeReason" class="form-control" placeholder="例如：北美市場促銷追加">
            </div>
            <button class="btn-action" onclick="runSimulation()">⚖️ 執行插單影響分析</button>
        </div>

        <div class="card summary-card">
            <strong style="color: var(--primary); margin-bottom: 10px; display: block;">📋 決策數據對比表</strong>
            <table class="data-table">
                <tr>
                    <th>項目說明</th>
                    <th>數值 (PCS)</th>
                </tr>
                <tr>
                    <td>原始平均庫存水位</td>
                    <td id="viewBase" class="val-bold">600</td>
                </tr>
                <tr>
                    <td>本次預計插單數量</td>
                    <td id="viewSurge" class="val-bold" style="color: var(--danger);">0</td>
                </tr>
                <tr style="background: #eee;">
                    <td><strong>模擬後平均餘額</strong></td>
                    <td id="viewBalance" class="val-bold" style="color: var(--success);">600</td>
                </tr>
            </table>
            <div id="conclusionBox" style="margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 0.85rem; border: 1px solid #ddd; background: #fff;">
                <b style="color: #666;">系統建議：</b><br>
                <span id="conclusionText">請輸入插單數量並點擊執行。</span>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="inventoryChart"></canvas>
    </div>
</div>

<script>
let myChart;
const labels = ['05/01', '05/02', '05/03', '05/04', '05/05', '05/06', '05/07'];
let currentBaseData = [500, 420, 850, 600, 350, 950, 900];

function initChart() {
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '原始庫存 (Original Plan)',
                data: currentBaseData,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { title: { display: true, text: '庫存量 (PCS)' }, grace: '15%' } }
        }
    });
}

function runSimulation() {
    const baseVal = parseInt(document.getElementById('baseInventory').value) || 0;
    const amount = parseInt(document.getElementById('surgeAmount').value) || 0;
    
    // 更新數據顯示
    document.getElementById('viewBase').innerText = baseVal;
    document.getElementById('viewSurge').innerText = "-" + amount;
    const balance = baseVal - amount;
    document.getElementById('viewBalance').innerText = balance;
    document.getElementById('viewBalance').style.color = balance < 300 ? 'var(--danger)' : 'var(--success)';

    // 更新圖表 (模擬整體水位變動)
    if (myChart.data.datasets.length > 1) { myChart.data.datasets.pop(); }
    
    const simulatedData = currentBaseData.map(v => (v - amount));
    myChart.data.datasets.push({
        label: `插單後預計餘額 (-${amount} PCS)`,
        data: simulatedData,
        borderColor: '#e74c3c',
        borderDash: [5, 5],
        borderWidth: 3,
        fill: false,
        tension: 0.4
    });
    myChart.update();

    // 更新結論
    const text = document.getElementById('conclusionText');
    if (balance < 300) {
        text.innerHTML = `<span style="color:var(--danger); font-weight:bold;">⚠️ 警報：</span>插單後水位掉至 ${balance}，低於安全水位 (300)。建議增加採購量或延後其他非急單排程。`;
    } else {
        text.innerHTML = `<span style="color:var(--success); font-weight:bold;">✅ 安全：</span>剩餘庫存 ${balance} 足以支撐。可承接此插單需求。`;
    }
}

window.onload = initChart;
</script>
</body>
</html>
