<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP 智慧決策中心 | 綜合管理看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; --bg-gray: #f8f9fa; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { border-left: 5px solid var(--primary); padding-left: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--primary); }

        /* 佈局：左側輸入，右側摘要，下方圖表 */
        .top-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 20px; align-items: stretch; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        
        /* 區塊標題樣式 */
        .section-title { font-weight: bold; font-size: 1rem; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #eee; display: flex; align-items: center; gap: 8px; }

        /* 表單樣式 */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }

        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-dark { background: var(--primary); color: white; }

        /* 比對清單樣 style */
        .diff-log { font-size: 0.85rem; background: white; border: 1px solid #ddd; border-radius: 6px; max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .diff-item { padding: 6px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .diff-err { border-left: 4px solid var(--danger); background: #fff5f5; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 5px; }
        .data-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .val-bold { font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        .chart-section { height: 350px; background: white; border: 1px solid #eee; padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 SAP 智慧決策與數據稽核系統</h1>
        <div id="statusBadge" style="padding: 5px 12px; border-radius: 15px; background: #eee; font-size: 0.75rem; font-weight: bold;">系統就緒</div>
    </div>

    <div class="top-grid">
        <div class="card" style="border-top: 4px solid var(--accent);">
            <div class="section-title">⚖️ 插單與 Excel 比對操作</div>
            
            <div class="form-group">
                <label>1. 上傳 SAP 數據檔 (支援多分頁比對)</label>
                <input type="file" id="fileInput" class="form-control" style="padding: 5px;">
            </div>

            <div class="form-group">
                <label>2. 模擬插單追加數量 (PCS)</label>
                <input type="number" id="surgeAmount" class="form-control" value="200">
            </div>

            <div class="form-group">
                <label>3. 變動原因說明</label>
                <input type="text" id="surgeReason" class="form-control" placeholder="例如：北美急單需求">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action btn-blue" onclick="runSimulation()">執行插單模擬</button>
                <button class="btn-action btn-dark" onclick="startExcelCompare()">執行 Excel 比對</button>
            </div>
        </div>

        <div class="card" style="border-top: 4px solid var(--primary); background: var(--bg-gray);">
            <div class="section-title">📋 決策數據與稽核日誌</div>
            
            <table class="data-table">
                <tr><td>原始庫存水位</td><td id="viewBase" class="val-bold">600</td></tr>
                <tr><td>本次追加插單</td><td id="viewSurge" class="val-bold" style="color:var(--danger);">0</td></tr>
                <tr style="background:#eee;"><td><b>預計剩餘餘額</b></td><td id="viewBalance" class="val-bold">600</td></tr>
            </table>

            <div id="diffLogContainer" style="margin-top: 15px;">
                <small style="font-weight: bold; color: #666;">Excel 異常偵測 (Audit Log):</small>
                <div id="diffLog" class="diff-log">
                    <p style="padding:10px; color:#999; text-align:center;">尚未執行比對...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="inventoryChart"></canvas>
    </div>
</div>

<script>
let myChart;
const labels = ['05/01', '05/02', '05/03', '05/04', '05/05', '05/06', '05/07'];
let baseData = [500, 450, 800, 600, 380, 900, 850];

function initChart() {
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '預估庫存水位 (PAB)',
                data: baseData,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { title: { display: true, text: '數量 (PCS)' }, grace: '15%' } }
        }
    });
}

// 功能一：插單模擬邏輯
function runSimulation() {
    const amount = parseInt(document.getElementById('surgeAmount').value) || 0;
    const baseVal = 600; // 模擬基礎值
    
    document.getElementById('viewBase').innerText = baseVal;
    document.getElementById('viewSurge').innerText = "-" + amount;
    const balance = baseVal - amount;
    document.getElementById('viewBalance').innerText = balance;
    document.getElementById('viewBalance').style.color = balance < 300 ? 'var(--danger)' : 'var(--success)';

    if (myChart.data.datasets.length > 1) { myChart.data.datasets.pop(); }
    
    const simulatedData = baseData.map(v => (v - amount));
    myChart.data.datasets.push({
        label: `插單後預估 (-${amount} PCS)`,
        data: simulatedData,
        borderColor: '#e74c3c',
        borderDash: [5, 5],
        borderWidth: 3,
        fill: false,
        tension: 0.4
    });
    myChart.update();
    document.getElementById('statusBadge').innerText = "插單模擬完成";
}

// 功能二：複雜 Excel 比對邏輯
function startExcelCompare() {
    const log = document.getElementById('diffLog');
    log.innerHTML = ""; // 清空
    
    // 模擬比對 5 組料號
    const skus = ['A-120', 'B-340', 'C-560', 'D-780', 'E-900'];
    const diffs = [0, -50, 0, 15, 0]; // 模擬差異數據

    skus.forEach((sku, i) => {
        const item = document.createElement('div');
        item.className = `diff-item ${diffs[i] !== 0 ? 'diff-err' : ''}`;
        item.innerHTML = `
            <span>料號: <b>${sku}</b></span>
            <span>${diffs[i] === 0 ? '✅ 帳實相符' : `<b style="color:var(--danger)">⚠️ 差異: ${diffs[i]}</b>`}</span>
        `;
        log.appendChild(item);
    });

    document.getElementById('statusBadge').innerText = "Excel 稽核完成";
    alert("【Excel 比對報告】\n已完成 240 筆資料比對。\n檢測到 2 處異常（已標記在稽核日誌中）。");
}

window.onload = initChart;
</script>
</body>
</html>
