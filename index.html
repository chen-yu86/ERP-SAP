<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP 智慧決策中心 | 數量模擬版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { border-left: 5px solid var(--primary); padding-left: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.7rem; color: var(--primary); }

        .showcase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; align-items: stretch; }
        
        .card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; }
        .input-card { border-top: 4px solid var(--accent); }
        .summary-card { background: #f8f9fa; border-top: 4px solid var(--primary); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }

        .upload-area { border: 2px dashed #dcdde1; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .upload-area:hover { background: #f0f7ff; border-color: var(--accent); }
        #fileInput { display: none; }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: auto; background: var(--primary); color: white; }
        .btn-action:hover { opacity: 0.9; }

        .chart-section { margin-top: 25px; height: 400px; background: white; border: 1px solid #eee; padding: 15px; border-radius: 10px; }
        #loading { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 10; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 SAP 智慧生管決策中心 <small style="font-weight: normal; font-size: 0.6em; color: #7f8c8d;">Demand Simulation</small></h1>
        <div id="statusBadge" style="padding: 5px 12px; border-radius: 15px; background: #eee; font-size: 0.75rem; font-weight: bold;">系統就緒</div>
    </div>

    <div class="showcase-grid">
        <div class="card input-card">
            <label for="fileInput" class="upload-area">
                <input type="file" id="fileInput">
                <div id="loading"><strong>處理中...</strong></div>
                <div style="font-size: 1.5rem;">📂</div>
                <strong id="fileName" style="font-size: 0.9rem;">上傳 SAP 數據檔</strong>
            </label>

            <div class="form-group">
                <label>追加需求數量 (PCS)</label>
                <input type="number" id="surgeAmount" class="form-control" value="100" step="10">
            </div>
            
            <div class="form-group">
                <label>需求異動原因</label>
                <input type="text" id="surgeReason" class="form-control" placeholder="例如：客戶急單插入、展覽樣品需求...">
            </div>

            <button class="btn-action" onclick="runSimulation()">⚖️ 執行插單模擬對比</button>
        </div>

        <div class="card summary-card">
            <strong style="margin-bottom: 15px; color: var(--primary);">📋 模擬決策摘要 (Decision Memo)</strong>
            <div id="analysisContent">
                <p style="color: #999; font-size: 0.9rem; text-align: center; margin-top: 40px;">請載入數據後進行插單模擬...</p>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="inventoryChart"></canvas>
    </div>
</div>

<script>
let myChart;
const labels = ['05/01', '05/02', '05/03', '05/04', '05/05', '05/06', '05/07'];
let baseData = [450, 380, 800, 550, 300, 920, 850];

function initChart() {
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '原始排程庫存 (Base Plan)',
                data: baseData,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { title: { display: true, text: '數量 (PCS)' }, grace: '15%' } }
        }
    });
}

function runSimulation() {
    const amount = parseInt(document.getElementById('surgeAmount').value) || 0;
    const reason = document.getElementById('surgeReason').value || "未註明原因";
    
    // 計算平均佔比 (純展示用，增加技術含金量)
    const avgBase = baseData.reduce((a, b) => a + b, 0) / baseData.length;
    const percent = ((amount / avgBase) * 100).toFixed(1);

    if (myChart.data.datasets.length > 1) { myChart.data.datasets.pop(); }

    // 模擬插單後庫存下降 (假設從 05/02 開始受影響)
    const simulatedData = baseData.map((v, i) => i > 0 ? (v - amount) : v);

    myChart.data.datasets.push({
        label: `插單後預估 (-${amount} PCS)`,
        data: simulatedData,
        borderColor: '#e74c3c',
        borderDash: [6, 4],
        borderWidth: 2,
        fill: false,
        tension: 0.4
    });

    myChart.update();

    document.getElementById('analysisContent').innerHTML = `
        <div style="margin-bottom:12px;"><b>模擬動作：</b> 追加需求 <span style="color:var(--danger)">${amount} PCS</span></div>
        <div style="margin-bottom:12px;"><b>需求佔比：</b> 約佔總量 <span style="color:var(--accent)">${percent}%</span></div>
        <div style="margin-bottom:12px;"><b>異動原因：</b> ${reason}</div>
        <div style="margin-top:15px; padding:10px; border-radius:5px; background:${simulatedData.some(v => v < 200) ? '#fff1f0' : '#f6ffed'}">
            <b>評估結論：</b> ${simulatedData.some(v => v < 200) ? 
            '<span style="color:var(--danger)">⚠️ 庫存將低於安全水位！建議重新協調生產順序。</span>' : 
            '<span style="color:var(--success)">✅ 現有庫存足以支撐此插單需求。</span>'}
        </div>
    `;
    
    document.getElementById('statusBadge').innerText = "模擬完成";
    document.getElementById('statusBadge').style.background = "#fff3e0";
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    document.getElementById('loading').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('fileName').innerText = "數據載入成功";
        document.getElementById('statusBadge').innerText = "數據已就緒";
    }, 400);
});

window.onload = initChart;
</script>
</body>
</html>
