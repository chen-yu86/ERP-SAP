<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP 智慧決策看板 | 實戰版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; --bg-gray: #f8f9fa; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 20px; border-top: 4px solid var(--accent); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-dark { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.8; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .data-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .val { font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        .diff-log { font-size: 0.85rem; background: white; border: 1px solid #ddd; border-radius: 5px; max-height: 160px; overflow-y: auto; margin-top: 10px; }
        .diff-item { padding: 8px 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .diff-err { border-left: 5px solid var(--danger); background: #fff5f5; }
        .chart-section { height: 350px; border: 1px solid #eee; border-radius: 12px; padding: 15px; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 SAP 智慧決策與數據稽核系統</h1>
        <div id="status" style="font-size: 0.8rem; font-weight: bold; color: var(--warning);">● 系統就緒</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="form-group">
                <label>1. 上傳 SAP/盤點 Excel 檔</label>
                <input type="file" id="fileInput" class="form-control" accept=".xlsx, .xls">
            </div>
            <div class="form-group">
                <label>2. 模擬插單數量 (PCS)</label>
                <input type="number" id="surgeAmount" class="form-control" value="200">
            </div>
            <button class="btn btn-blue" onclick="runSimulation()">⚖️ 執行插單模擬</button>
            <button class="btn btn-dark" onclick="processExcel()">🔍 執行 Excel 真實比對</button>
        </div>

        <div class="card" style="border-top-color: var(--primary); background: var(--bg-gray);">
            <table class="data-table">
                <tr><td>原始總庫存水位</td><td id="viewBase" class="val">600</td></tr>
                <tr><td>預計插單扣除</td><td id="viewSurge" class="val" style="color:var(--danger)">0</td></tr>
                <tr style="background:#eee"><td><b>預計餘額 (PAB)</b></td><td id="viewBalance" class="val">600</td></tr>
            </table>
            <div id="diffLog" class="diff-log">
                <p style="padding:10px; color:#999; text-align:center;">Excel 比對結果將顯示於此</p>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="inventoryChart"></canvas>
    </div>
</div>

<script>
let myChart;
let baseData = [550, 480, 820, 610, 390, 910, 860];
const labels = ['05/01', '05/02', '05/03', '05/04', '05/05', '05/06', '05/07'];

// 初始化圖表
function initChart() {
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '預估庫存水位',
                data: baseData,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// 邏輯一：插單模擬
function runSimulation() {
    const amount = parseInt(document.getElementById('surgeAmount').value) || 0;
    const balance = 600 - amount;
    
    document.getElementById('viewSurge').innerText = "-" + amount;
    document.getElementById('viewBalance').innerText = balance;
    document.getElementById('viewBalance').style.color = balance < 300 ? 'var(--danger)' : 'var(--success)';

    if (myChart.data.datasets.length > 1) myChart.data.datasets.pop();
    myChart.data.datasets.push({
        label: `插單後預估 (-${amount} PCS)`,
        data: baseData.map(v => v - amount),
        borderColor: '#e74c3c', borderDash: [5, 5], borderWidth: 2, fill: false
    });
    myChart.update();
    document.getElementById('status').innerText = "● 模擬完成";
}

// 邏輯二：真實 Excel 解析與比對
function processExcel() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("請先上傳檔案！");

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});

        // 檢查分頁是否存在
        if (!workbook.Sheets['SAP_Export'] || !workbook.Sheets['Physical_Count']) {
            return alert("錯誤：Excel 必須包含 [SAP_Export] 與 [Physical_Count] 兩個分頁！");
        }

        const sapJson = XLSX.utils.sheet_to_json(workbook.Sheets['SAP_Export']);
        const countJson = XLSX.utils.sheet_to_json(workbook.Sheets['Physical_Count']);

        // 建立索引 Map (以料號為 Key)
        const sapMap = {};
        sapJson.forEach(row => {
            const sku = row['料號'] || row['物料料號'] || row['SKU'];
            sapMap[sku] = row['系統庫存'] || row['Qty'];
        });

        // 執行比對
        const log = document.getElementById('diffLog');
        log.innerHTML = "";
        
        countJson.forEach(row => {
            const sku = row['料號'] || row['物料料號'] || row['SKU'];
            const actual = row['實盤數量'] || row['Actual'];
            const sapQty = sapMap[sku] || 0;
            const diff = actual - sapQty;

            const div = document.createElement('div');
            div.className = `diff-item ${diff !== 0 ? 'diff-err' : ''}`;
            div.innerHTML = `<span>${sku}</span><span>系統:${sapQty} | 實盤:${actual} | <b>${diff === 0 ? 'OK' : '差異:' + diff}</b></span>`;
            log.appendChild(div);
        });
        document.getElementById('status').innerText = "● 稽核完成";
    };
    reader.readAsArrayBuffer(file);
}

window.onload = initChart;
</script>
</body>
</html>
